name: My First GitHub Actions

on: [push]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
    - name: Check Python
      run: |
        python3 --version
        which python3

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install pytest

    - name: Run tests
      run: |
        cd src
        python3 -m pytest addition.py
